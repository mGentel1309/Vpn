name: 🔄 Auto-Update & Pick Best Servers

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  
jobs:
  update-and-pick:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔗 Configure git remotes
        run: |
          git remote add upstream https://github.com/zieng2/wl.git || true
          git remote -v
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: ⚙️  Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any required pip packages if needed
      
      - name: 🚀 Run fetch and pick script
        run: |
          cd "${{ github.workspace }}"
          bash ./tools/fetch-and-pick.sh
        env:
          TRIES: 3
          TOP: 10
      
      - name: 📤 Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet; then
            echo "ℹ️  No changes detected"
            exit 0
          fi
          
          git add vpn.txt top-10.txt vless*.txt README.md
          git commit -m "🤖 Auto: Update fastest servers ($(date '+%Y-%m-%d %H:%M:%S'))" || true
          git push origin main || echo "Push might have failed, but workflow complete"
      
      - name: 📊 Report status
        if: always()
        run: |
          echo "✅ Workflow completed!"
          if [ -f "vpn.txt" ]; then
            echo ""
            echo "📋 Top servers ready in vpn.txt:"
            wc -l vpn.txt
            head -3 vpn.txt
          fi
