name: Update VPN Subscription

on:
  schedule:
    - cron: '0 */4 * * *'  # Каждые 4 часа
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main ]
    paths:
      - 'tools/update_and_pick.sh'
      - 'tools/vpn_picker.py'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        # Если нужны зависимости, установите их здесь
        # pip install -r requirements.txt  # Если есть

    - name: Run update script
      run: |
        cd tools
        bash update_and_pick.sh

    - name: Update subscription file
      run: |
        cp local-out/top.txt subscription.txt

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add subscription.txt local-out/ tools/
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update VPN subscription [$(date +'%Y-%m-%d %H:%M')]"
          git push
        fi